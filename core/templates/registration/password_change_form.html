{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>修改密码</h2>
        <p style="color: var(--muted); margin-top: -4px;">建议使用高强度密码保障账号安全</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div style="display: flex; gap: 10px;">
                <button type="submit">提交</button>
                <a class="chip" href="{% url 'profile_settings' %}">返回个人设置</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
