{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>欢迎回来</h2>
        <p style="color: var(--muted); margin-top: -4px;">登录后继续进行原始需求会话收集</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">登录</button>
        </form>
    </div>
</div>
{% endblock %}
