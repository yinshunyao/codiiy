<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}需求收集系统{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --panel-2: #1d2230;
            --text: #eceff7;
            --muted: #9ca7c3;
            --line: #2b3245;
            --primary: #5b8cff;
            --primary-hover: #4f7ff3;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: radial-gradient(circle at top, #141926 0, var(--bg) 35%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        a { color: #9ec1ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .auth-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .auth-card {
            width: min(520px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }
        .auth-card h2 { margin-top: 0; }
        .app-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }
        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(14, 17, 24, 0.72);
            padding: 16px 12px;
            backdrop-filter: blur(4px);
            height: 100vh;
            overflow-x: visible;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 20;
        }
        .brand {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
            padding: 0 8px;
        }
        .nav-action {
            display: block;
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .nav-action:hover { background: var(--primary-hover); text-decoration: none; }
        .nav-list {
            margin: 0;
            padding: 0;
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        .nav-list a {
            display: block;
            color: var(--text);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid transparent;
            background: transparent;
        }
        .nav-list a:hover,
        .nav-list a.active {
            background: var(--panel-2);
            border-color: var(--line);
            text-decoration: none;
        }
        .nav-list li {
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 18px;
            line-height: 1;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .nav-list li:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ff8f8f;
        }
        .main-panel {
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .top-actions-left,
        .top-actions-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chip {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--muted);
            font-size: 12px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
        }
        .conversation {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px 18px;
        }
        .chat-track {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message-row {
            display: flex;
            width: 100%;
            padding: 0 6px;
        }
        .message-row.user {
            justify-content: flex-end;
        }
        .message-row.assistant {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 78%;
            min-width: 128px;
            background: linear-gradient(180deg, #20273a, #1b2131);
            border: 1px solid #313a52;
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 0;
            line-height: 1.55;
            height: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        }
        .bubble-user {
            background: linear-gradient(180deg, #2a3657, #222d49);
            border-color: #40527f;
        }
        .message-text {
            margin-top: 4px;
            white-space: normal;
            word-break: break-word;
            line-height: 1.55;
        }
        .voice-record-block {
            margin-bottom: 8px;
        }
        .voice-record-block audio {
            width: 100%;
            max-width: 360px;
        }
        .voice-transcript-wrap {
            margin-top: 6px;
        }
        .voice-transcript-text {
            margin-top: 8px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
        }
        .voice-transcript-text.is-collapsed {
            display: none;
        }
        .meta { color: var(--muted); font-size: 12px; margin-top: 8px; }
        .composer {
            margin-top: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
            position: sticky;
            bottom: 0;
        }
        .composer-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-input-shell {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 56px;
            border: 1px solid #d9dbe2;
            border-radius: 999px;
            background: #f7f8fa;
            padding: 6px 8px;
        }
        .chat-input-main {
            flex: 1;
            min-width: 0;
        }
        .chat-input-main textarea {
            width: 100%;
            min-height: 36px;
            max-height: 120px;
            resize: none;
            border: none;
            background: transparent;
            color: #1f2533;
            padding: 6px 8px;
            line-height: 1.4;
            box-shadow: none;
            outline: none;
        }
        .chat-input-main textarea:focus {
            outline: none;
            border: none;
        }
        .input-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: none;
            background: transparent;
            color: #1f2533;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            line-height: 1;
            padding: 0;
        }
        .input-icon-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #1f2533;
        }
        .input-icon-btn.is-active {
            background: rgba(0, 0, 0, 0.1);
        }
        .plus-btn {
            font-size: 30px;
            font-weight: 300;
        }
        .voice-orb-btn {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            border: none;
            background: #0a0a0a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 0;
        }
        .voice-orb-btn:hover {
            background: #121212;
        }
        .voice-orb-btn .voice-bar {
            width: 3px;
            border-radius: 2px;
            background: #ffffff;
            display: inline-block;
        }
        .voice-orb-btn .voice-bar:nth-child(1) {
            height: 10px;
        }
        .voice-orb-btn .voice-bar:nth-child(2) {
            height: 16px;
        }
        .voice-orb-btn .voice-bar:nth-child(3) {
            height: 12px;
        }
        .voice-orb-btn.is-recording {
            background: #d93025;
        }
        .composer-status,
        .composer-attachment-info {
            margin: 0 10px;
            font-size: 12px;
        }
        .composer-submit-btn {
            align-self: flex-end;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 999px;
        }

        /* Form elements styling */
        select, input, textarea, button {
            background-color: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        select:hover, input:hover, textarea:hover, button:hover {
            border-color: var(--primary);
        }

        select:focus, input:focus, textarea:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        button {
            cursor: pointer;
            background-color: var(--primary);
            color: white;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Style for file input */
        input[type="file"] {
            background-color: transparent;
            border: none;
            padding: 0;
        }

        input[type="file"]::file-selector-button {
            background-color: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Custom Dropdown */
        .custom-dropdown {
            position: relative;
            z-index: 1200;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            left: 0;
            top: calc(100% + 4px);
            background-color: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            width: 360px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            z-index: 1300;
            max-height: 320px;
            overflow: hidden;
        }
        .custom-dropdown.open .dropdown-menu {
            display: block;
        }
        .dropdown-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
        }
        .dropdown-item:hover {
            background-color: var(--panel-2);
            color: var(--text);
        }
        .dropdown-item.active {
            background-color: var(--panel-2);
            color: var(--text);
        }
        .llm-chip-btn {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--line);
            border-radius: 999px;
            cursor: pointer;
        }
        .llm-chip-btn:hover {
            background: transparent;
            color: var(--muted);
            border-color: var(--line);
        }
        .icon-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
        }
        .llm-cascade {
            display: grid;
            grid-template-columns: 120px 240px;
            height: 320px;
            width: 360px;
        }
        .llm-provider-list {
            width: 120px;
            height: 100%;
            border-right: 1px solid var(--line);
            overflow-y: scroll;
            background: rgba(255, 255, 255, 0.01);
            scrollbar-width: thin;
        }
        .llm-model-list {
            width: 240px;
            height: 100%;
            overflow-y: scroll;
            background: rgba(255, 255, 255, 0.04);
            border-left: 1px solid rgba(255, 255, 255, 0.04);
            scrollbar-width: thin;
        }
        .llm-provider-list::-webkit-scrollbar,
        .llm-model-list::-webkit-scrollbar {
            width: 8px;
        }
        .llm-provider-list::-webkit-scrollbar-track,
        .llm-model-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .llm-provider-list::-webkit-scrollbar-thumb,
        .llm-model-list::-webkit-scrollbar-thumb {
            background: rgba(156, 167, 195, 0.45);
            border-radius: 999px;
        }
        .llm-provider-list::-webkit-scrollbar-thumb:hover,
        .llm-model-list::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 167, 195, 0.7);
        }
        form p { margin: 10px 0; }
        .voice-input-actions {
            margin-top: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label { color: var(--muted); font-size: 13px; display: block; margin-bottom: 6px; }
        input, textarea {
            width: 100%;
            background: #121826;
            border: 1px solid #313a52;
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
        }
        textarea { resize: vertical; min-height: 96px; }
        button {
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            padding: 10px 14px;
            cursor: pointer;
        }
        button:hover { background: var(--primary-hover); }
        .ghost-btn {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--text);
        }
        .chat-input-shell .input-icon-btn {
            background: transparent;
            color: #1f2533;
            border: none;
        }
        .chat-input-shell .input-icon-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #1f2533;
        }
        .chat-input-shell .voice-orb-btn {
            background: #0a0a0a;
            border: none;
        }
        .chat-input-shell .voice-orb-btn:hover {
            background: #121212;
        }
        .chat-input-shell .voice-orb-btn.is-recording {
            background: #d93025;
        }
        .composer-submit-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
        }
        @media (max-width: 960px) {
            .app-shell { grid-template-columns: 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
            .nav-list { max-height: 260px; }
            .chat-track { max-width: 100%; }
            .message-row { padding: 0; }
            .bubble { max-width: 92%; min-width: 0; }
        }
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
